<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>رحلة لاتنسى 3 — اختيار المقاعد</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@500;700;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --gold: #C9A84C; --gold-light: #F0D080;
  --navy: #0B1F3A; --bus-gold: #D4B663;
  --glass: #1A1A1A; --seat-blue: #2E4A99;
  --seat-taken: #136047; --white: #FAFAF8;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Cairo', sans-serif; background: #060F1E; color: var(--white);
  overflow-x: hidden; min-height: 100vh;
}

/* HEADER */
.ph { text-align: center; padding: 2rem 1rem; border-bottom: 1px solid rgba(201,168,76,0.2); }
.ph-title { font-family: 'Tajawal', sans-serif; font-size: 32px; color: var(--gold-light); font-weight: 900; }

/* NAME INPUT */
#nameSection { max-width: 400px; margin: 3rem auto; padding: 2rem; background: rgba(255,255,255,0.05); border-radius: 15px; border: 1px solid var(--gold); }
.ninp { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--gold); background: #0B1F3A; color: white; text-align: center; }
.bstart { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 8px; font-weight: 700; cursor: pointer; color: var(--navy); }

/* BUS CONTAINER */
#busSection { display: none; padding: 1rem; }
.buses-row { display: flex; gap: 3rem; justify-content: center; flex-wrap: wrap; padding-top: 2rem; }

/* THE BUS EXTERIOR DESIGN */
.bus-outer {
  position: relative; width: 280px; background: var(--bus-gold);
  border-radius: 60px 60px 15px 15px; /* rounded front */
  border: 4px solid #B59540; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
  padding-bottom: 10px;
}

/* Front Windshield (Black Glass) */
.bus-front-glass {
  height: 80px; background: #111; margin: 8px;
  border-radius: 50px 50px 10px 10px; position: relative;
  border-bottom: 5px solid #222;
}
.bus-front-glass::after { /* Reflection */
  content: ''; position: absolute; top: 10%; left: 15%; width: 70%; height: 20%;
  background: rgba(255,255,255,0.1); border-radius: 20px;
}

/* Side Windows */
.side-windows {
  display: flex; gap: 2px; padding: 0 8px; background: #222; margin-bottom: 10px;
}
.side-win { flex: 1; height: 35px; background: linear-gradient(180deg, #1A1A1A, #333); }

/* Interior Cabin */
.cabin {
  background: #121E31; margin: 0 12px; padding: 15px 5px; border-radius: 5px;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
  border: 2px solid #1C3050;
}

/* SEAT GRID */
.srows { display: flex; flex-direction: column; gap: 8px; }
.srow { display: flex; justify-content: space-between; align-items: center; padding: 0 5px; }
.seat-pair { display: flex; gap: 4px; }

/* SEAT STYLING (Based on the blue seats in the photo) */
.seat {
  width: 38px; height: 42px; background: var(--seat-blue);
  border-radius: 6px 6px 2px 2px; cursor: pointer; position: relative;
  border-bottom: 4px solid #1A2A5A; transition: 0.2s;
}
.seat::before { /* Headrest like the photo */
  content: ''; position: absolute; top: 2px; left: 15%; width: 70%; height: 8px;
  background: #4A6ACF; border-radius: 3px;
}
.seat.taken { background: var(--seat-taken); cursor: not-allowed; border-bottom-color: #0A3D2D; }
.seat.mine { background: var(--gold); border-bottom-color: #8B6914; }
.slbl { position: absolute; bottom: 2px; width: 100%; text-align: center; font-size: 10px; font-weight: bold; color: white; }

/* Aisle */
.aisle { width: 30px; display: flex; justify-content: center; align-items: center; color: rgba(255,255,255,0.1); font-size: 10px; }

/* Last Row (Connected) */
.last-row { display: flex; gap: 3px; justify-content: center; margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); }

/* Legend & Info */
.legend { display: flex; justify-content: center; gap: 15px; margin-top: 2rem; font-size: 14px; }
.leg-item { display: flex; align-items: center; gap: 5px; }
.box { width: 15px; height: 15px; border-radius: 3px; }

#toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--gold); color: var(--navy); padding: 10px 20px; border-radius: 20px;
  font-weight: bold; display: none; z-index: 100;
}
</style>
</head>
<body>

<div class="ph">
  <p style="color:var(--gold); letter-spacing: 3px;">SAPTCO VIP</p>
  <h1 class="ph-title">رحلة لاتنسى ٣</h1>
  <p>اختر مقعدك في الباص الذهبي</p>
</div>

<div id="nameSection">
  <p>أدخل اسمك الكريم للمتابعة:</p>
  <input type="text" id="ni" class="ninp" placeholder="الاسم ثلاثي" maxlength="15">
  <button class="bstart" onclick="go()">دخول لنظام الحجز</button>
</div>

<div id="busSection">
  <div class="buses-row" id="busesRow"></div>
  
  <div class="legend">
    <div class="leg-item"><div class="box" style="background:var(--seat-blue)"></div> متاح</div>
    <div class="leg-item"><div class="box" style="background:var(--seat-taken)"></div> محجوز</div>
    <div class="leg-item"><div class="box" style="background:var(--gold)"></div> مقعدك</div>
  </div>
</div>

<div id="toast"></div>

<script>
let userName = '';
const seatsData = { 1: {}, 2: {} };
const picks = {};

function go() {
  const v = document.getElementById('ni').value.trim();
  if (!v) return alert('يرجى إدخال الاسم');
  userName = v;
  document.getElementById('nameSection').style.display = 'none';
  document.getElementById('busSection').style.display = 'block';
  renderBuses();
}

function renderBuses() {
  const container = document.getElementById('busesRow');
  container.innerHTML = '';
  [1, 2].forEach(id => {
    const busDiv = document.createElement('div');
    busDiv.className = 'bus-outer';
    busDiv.innerHTML = `
      <div style="text-align:center; padding:10px; font-weight:bold; color:var(--navy)">الباص ${id === 1 ? 'الأول' : 'الثاني'}</div>
      <div class="bus-front-glass"></div>
      <div class="side-windows">
        <div class="side-win"></div><div class="side-win"></div><div class="side-win"></div><div class="side-win"></div>
      </div>
      <div class="cabin">
        <div class="srows">${renderRows(id)}</div>
        <div class="last-row">${renderLastRow(id)}</div>
      </div>
    `;
    container.appendChild(busDiv);
  });
}

function renderRows(bid) {
  let html = '';
  // 10 صفوف، كل صف 2 يمين و 2 يسار
  for (let r = 1; r <= 10; r++) {
    html += `<div class="srow">
      <div class="seat-pair">
        ${mkSeat(bid, r, 'أ')}
        ${mkSeat(bid, r, 'ب')}
      </div>
      <div class="aisle">||</div>
      <div class="seat-pair">
        ${mkSeat(bid, r, 'ج')}
        ${mkSeat(bid, r, 'د')}
      </div>
    </div>`;
  }
  return html;
}

function renderLastRow(bid) {
  // الصف الأخير 5 مقاعد مشبوكة
  return ['س1','س2','س3','س4','س5'].map(s => mkSeat(bid, 11, s)).join('');
}

function mkSeat(bid, row, col) {
  const sid = `B${bid}-R${row}-${col}`;
  const isTaken = seatsData[bid][sid];
  const isMine = picks[userName] === sid;
  
  let className = 'seat';
  if (isMine) className += ' mine';
  else if (isTaken) className += ' taken';

  return `<div class="${className}" onclick="pickSeat('${bid}','${sid}')">
    <div class="slbl">${col}</div>
  </div>`;
}

function pickSeat(bid, sid) {
  if (seatsData[bid][sid]) return; // محجوز
  
  // إلغاء الحجز السابق إن وجد
  if (picks[userName]) {
    const oldSid = picks[userName];
    const oldBid = oldSid.split('-')[0].replace('B','');
    delete seatsData[oldBid][oldSid];
  }

  seatsData[bid][sid] = userName;
  picks[userName] = sid;
  
  renderBuses();
  showToast("تم اختيار المقعد بنجاح!");
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}
</script>

</body>
</html>
