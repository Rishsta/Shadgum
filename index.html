<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>رحلة لاتنسى 3 — التجربة الواقعية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --gold: #C9A84C; --gold-light: #F0D080; --navy: #0B1F3A;
  --bus-body: #D4B663; --cabin-bg: #0a0e17;
  --seat-blue: #2A467D; --seat-mine: #C9A84C;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Cairo', sans-serif; background: #060F1E; color: #fff;
  min-height: 100vh; overflow-x: hidden;
}

/* HEADER */
.ph { text-align: center; padding: 2rem; border-bottom: 1px solid rgba(201,168,76,0.1); }
.ph-title { font-size: clamp(24px, 5vw, 40px); color: var(--gold-light); font-weight: 900; }

/* LAYOUT: BUSES SIDE BY SIDE */
.buses-container {
  display: flex; flex-direction: row; justify-content: center; align-items: flex-start;
  gap: 40px; padding: 2rem; flex-wrap: wrap; /* يخليهم جنب بعض وللجوال تحت بعض */
}

/* THE BUS VR BOX */
.bus-vr-box {
  position: relative; width: 320px; background: var(--bus-body);
  border-radius: 80px 80px 20px 20px; border: 4px solid #8B6914;
  box-shadow: 0 30px 60px rgba(0,0,0,0.8); padding-bottom: 20px;
  perspective: 1000px; /* لإعطاء شعور العمق */
}

.bus-label { text-align: center; padding: 15px; font-weight: 900; color: var(--navy); font-size: 18px; }

/* CABIN WITH PERSPECTIVE */
.cabin-viewport {
  background: var(--cabin-bg); margin: 0 12px; border-radius: 10px;
  height: 600px; position: relative; overflow-y: auto; overflow-x: hidden;
  border: 2px solid #1C3050; box-shadow: inset 0 0 50px #000;
  scrollbar-width: none; /* إخفاء السكرول لشكل أنظف */
}

/* THE WALKING AVATAR */
.avatar {
  position: absolute; left: 50%; transform: translateX(-50%);
  width: 40px; height: 40px; background: var(--gold);
  border-radius: 50%; z-index: 10; pointer-events: none;
  box-shadow: 0 0 20px var(--gold); border: 3px solid #fff;
  transition: top 0.8s cubic-bezier(0.45, 0.05, 0.55, 0.95);
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.avatar::after { /* كنه كشاف قدام الشخصية */
  content: ''; position: absolute; top: -40px; width: 60px; height: 100px;
  background: radial-gradient(circle, rgba(201,168,76,0.3), transparent); transform: rotate(180deg);
}

/* ROWS */
.vr-row {
  display: flex; justify-content: space-between; padding: 20px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer;
  transition: background 0.3s;
}
.vr-row:hover { background: rgba(201,168,76,0.05); }

/* REALISTIC SEATS */
.seat-group { display: flex; gap: 8px; }
.v-seat {
  width: 45px; height: 50px; position: relative;
}
.v-seat .head { height: 12px; background: #3D69B0; border-radius: 8px 8px 2px 2px; margin-bottom: 2px; }
.v-seat .back { height: 35px; background: var(--seat-blue); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }

.v-seat.mine .head, .v-seat.mine .back { background: var(--gold); color: var(--navy); }
.v-seat.taken .head, .v-seat.taken .back { background: #136047; opacity: 0.6; }

/* AISLE */
.v-aisle { width: 40px; text-align: center; color: rgba(255,255,255,0.1); font-weight: 900; }

/* LAST ROW */
.v-last-row { display: flex; gap: 4px; justify-content: center; padding: 40px 10px; background: rgba(0,0,0,0.3); }

/* TOAST */
#toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: var(--gold); color: var(--navy); padding: 12px 25px; border-radius: 50px;
  font-weight: bold; z-index: 1000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* MODAL FOR SEAT PICK */
#pickModal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000;
  display: none; align-items: center; justify-content: center;
}
.modal-content { background: var(--navy); padding: 2rem; border-radius: 20px; border: 2px solid var(--gold); text-align: center; max-width: 90%; }

#nameSection { max-width: 400px; margin: 4rem auto; padding: 2rem; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid var(--gold); text-align: center; }
.ninp { width: 100%; padding: 15px; margin: 15px 0; border-radius: 10px; border: none; background: #162640; color: #fff; text-align: center; font-size: 18px; }
.bstart { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: var(--navy); }

</style>
</head>
<body>

<div class="ph">
  <h1 class="ph-title">رحلة لاتنسى ٣ — التجربة الواقعية</h1>
  <p style="color: var(--gold)">تجوّل في المقصورة واختر مقعدك</p>
</div>

<div id="nameSection">
  <p>أهلاً بك.. أدخل اسمك لبدء التجول</p>
  <input type="text" id="ni" class="ninp" placeholder="اسمك الكريم">
  <button class="bstart" onclick="startApp()">دخول المقصورة 🚶‍♂️</button>
</div>

<div id="busSection" style="display: none;">
  <div class="buses-container" id="busesRow"></div>
</div>

<div id="pickModal">
  <div class="modal-content" id="modalBody"></div>
</div>

<div id="toast"></div>

<script>
let userName = '';
let myPick = { busId: null, seatId: null };
const seatsData = { 1: {}, 2: {} };

function startApp() {
  const v = document.getElementById('ni').value.trim();
  if(!v) return alert('الرجاء إدخال اسمك');
  userName = v;
  document.getElementById('nameSection').style.display = 'none';
  document.getElementById('busSection').style.display = 'block';
  renderBuses();
}

function renderBuses() {
  const container = document.getElementById('busesRow');
  container.innerHTML = '';
  [1, 2].forEach(id => {
    const bus = document.createElement('div');
    bus.className = 'bus-vr-box';
    bus.innerHTML = `
      <div class="bus-label">الباص ${id === 1 ? 'الأول' : 'الثاني'}</div>
      <div class="cabin-viewport" id="viewport-${id}">
        <div class="avatar" id="avatar-${id}" style="top: 20px;">👤</div>
        <div style="height: 40px;"></div> ${renderVRRows(id)}
        <div class="v-last-row" onclick="moveAvatar(${id}, 11, event)">
          ${['هـ1','هـ2','هـ3','هـ4','هـ5'].map(s => mkSeat(id, 11, s)).join('')}
        </div>
      </div>
    `;
    container.appendChild(bus);
  });
}

function renderVRRows(bid) {
  let h = '';
  for(let r=1; r<=10; r++) {
    h += `
      <div class="vr-row" onclick="moveAvatar(${bid}, ${r}, event)">
        <div class="seat-group">
          ${mkSeat(bid, r, 'أ')}
          ${mkSeat(bid, r, 'ب')}
        </div>
        <div class="v-aisle">||</div>
        <div class="seat-group">
          ${mkSeat(bid, r, 'ج')}
          ${mkSeat(bid, r, 'د')}
        </div>
      </div>`;
  }
  return h;
}

function mkSeat(bid, r, c) {
  const sid = `B${bid}-R${r}-${c}`;
  const isMine = myPick.seatId === sid;
  const isTaken = seatsData[bid][sid] && !isMine;
  let cls = 'v-seat';
  if(isMine) cls += ' mine';
  if(isTaken) cls += ' taken';
  
  return `<div class="${cls}"><div class="head"></div><div class="back">${c}</div></div>`;
}

function moveAvatar(bid, row, event) {
  const avatar = document.getElementById(`avatar-${bid}`);
  // حساب المسافة من أعلى الكابينة
  const rowElement = event.currentTarget;
  const topPos = rowElement.offsetTop;
  
  avatar.style.top = (topPos + 10) + 'px';
  
  // بعد ما "يمشي" الشخصية، نفتح خيارات المقعد
  setTimeout(() => {
    openSeatPicker(bid, row);
  }, 800);
}

function openSeatPicker(bid, row) {
  const modal = document.getElementById('pickModal');
  const body = document.getElementById('modalBody');
  modal.style.display = 'flex';
  
  let seatsHtml = '';
  const cols = row === 11 ? ['هـ1','هـ2','هـ3','هـ4','هـ5'] : ['أ','ب','ج','د'];
  
  body.innerHTML = `
    <h2 style="color:var(--gold); margin-bottom:15px;">الصف رقم ${row}</h2>
    <p style="margin-bottom:20px;">اختر المقعد الذي تريده:</p>
    <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
      ${cols.map(c => {
        const sid = `B${bid}-R${row}-${c}`;
        const taken = seatsData[bid][sid];
        return `<button onclick="confirmPick('${bid}','${sid}')" 
                style="padding:15px 25px; border-radius:10px; border:none; background:${taken?'#333':(myPick.seatId===sid? 'var(--gold)':'#2A467D')}; color:white; cursor:pointer;"
                ${taken ? 'disabled' : ''}>
                مقعد ${c} ${taken ? '(محجوز)' : ''}
                </button>`;
      }).join('')}
    </div>
    <br><button onclick="closeModal()" style="color:var(--gold-light); background:none; border:none; margin-top:20px; cursor:pointer;">إغلاق ✖</button>
  `;
}

function confirmPick(bid, sid) {
  // إلغاء القديم
  if(myPick.seatId) delete seatsData[myPick.busId][myPick.seatId];
  
  seatsData[bid][sid] = userName;
  myPick = { busId: bid, seatId: sid };
  
  closeModal();
  renderBuses();
  showToast("✅ تم اختيار المقعد بنجاح!");
}

function closeModal() { document.getElementById('pickModal').style.display = 'none'; }

function showToast(m) {
  const t = document.getElementById('toast');
  t.innerText = m; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}
</script>
</body>
</html>
