<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>رحلة لاتنسى 3 — اختيار المقاعد</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
/* ── التنسيقات والأنيميشن الأصلية ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-light:#F0D080;
  --navy:#0B1F3A;--bus-body:#D4B663;
  --sf-top:#3D69B0;--sf-bod:#2A467D;
  --st-top:#1A8060;--st-bod:#136047;
  --sm-top:#C9A84C;--sm-bod:#A07830;
  --white:#FAFAF8;
}
body{
  font-family:'Cairo',sans-serif;
  background:linear-gradient(160deg,#060F1E 0%,#0B1F3A 55%,#071526 100%);
  min-height:100vh;color:var(--white);overflow-x:hidden;
}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(201,168,76,.1) 0%,transparent 60%);pointer-events:none;}

.ph{text-align:center;padding:2.5rem 1rem 1.5rem;border-bottom:1px solid rgba(201,168,76,.1);margin-bottom:2rem;background:linear-gradient(180deg,rgba(201,168,76,.06) 0%,transparent 100%);}
.ph-title{font-family:'Tajawal',sans-serif;font-size:clamp(28px,6vw,52px);font-weight:900;color:var(--gold-light);text-shadow:0 0 40px rgba(201,168,76,.3);margin-bottom:10px;}
.ph-sub{font-size:clamp(16px,3vw,20px);color:rgba(250,250,248,.8);font-weight:500;}

#nameSection{max-width:420px;margin:0 auto 2.5rem;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);border-radius:20px;padding:2rem 1.75rem;animation:fu .5s ease both;}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.ninp{width:100%;padding:11px 15px;font-size:16px;font-family:'Cairo',sans-serif;background:rgba(255,255,255,.07);border:1px solid rgba(201,168,76,.3);border-radius:12px;color:var(--white);text-align:right;margin-bottom:13px;}
.bstart{width:100%;padding:13px;font-weight:700;background:linear-gradient(135deg,var(--gold),#8B6914);color:var(--navy);border:none;border-radius:12px;cursor:pointer;width:100%;transition:0.3s;}
.bstart:hover{transform:scale(1.02);box-shadow:0 0 15px var(--gold);}

#busSection{display:none;animation:fu .4s ease both}
.wbar{display:flex;align-items:center;justify-content:space-between;max-width:1100px;margin:0 auto 1.5rem;background:rgba(201,168,76,.08);padding:11px 18px;border-radius:14px;border:1px solid rgba(201,168,76,0.2)}
.buses-row{display:flex;gap:3rem;justify-content:center;flex-wrap:wrap;padding:0 1rem;align-items: flex-start;}

.bus-body{position:relative;width:280px;background:linear-gradient(180deg, var(--bus-body) 0%, #B59540 100%);border-radius:70px 70px 15px 15px;border:3px solid #8B6914;box-shadow:0 16px 60px rgba(0,0,0,0.7);overflow:hidden;}
.bus-windshield{height:85px;background:#0a0a0a;margin:8px;border-radius:60px 60px 10px 10px;border-bottom:4px solid #1a1a1a;}

.cabin{background:linear-gradient(180deg,#14223A 0%,#0D1626 100%);margin:0 10px 10px;padding:20px 6px;border-radius:4px;box-shadow:inset 0 0 25px rgba(0,0,0,0.9);}
.srows{display:flex;flex-direction:column;gap:8px}
.srow{display:flex;align-items:center;justify-content:space-between;padding:0 4px;min-height: 55px;}
.seat-pair{display:flex;gap:4px}
.aisle{width:30px;display:flex;justify-content:center;align-items:center;color:rgba(255,255,255,0.02);font-weight:900;}

.service-unit{
  width:82px; height: 115px; background: rgba(0,0,0,0.4); border-radius: 8px; 
  border: 1px solid rgba(201,168,76,0.3); display: flex; align-items: center; 
  justify-content: center; text-align: center; font-size: 10px; color: var(--gold);
}

.seat{width:38px;cursor:pointer;flex-shrink:0;transition:transform .12s;position:relative;--sb:var(--sf-top);--sc:var(--sf-bod);}
.seat.taken{--sb:var(--st-top);--sc:var(--st-bod);cursor:default}
.seat.mine{--sb:var(--sm-top);--sc:var(--sm-bod);cursor:default;animation:sp .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes sp{from{transform:scale(.6)}to{transform:scale(1)}}

.sh{width:38px;height:10px;background:linear-gradient(180deg,color-mix(in srgb,var(--sb) 80%,#fff 20%),var(--sb));border-radius:6px 6px 2px 2px;margin-bottom:1px;}
.sb{width:38px;height:32px;background:linear-gradient(180deg,var(--sb) 0%,color-mix(in srgb,var(--sb) 75%,#000 25%) 100%);border-radius:2px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.slbl{font-size:10px;font-weight:700;color:white;}
.sown{font-size:6px;color:rgba(255,255,255,0.5);max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sc{width:38px;height:12px;background:linear-gradient(180deg,var(--sc),color-mix(in srgb,var(--sc) 70%,#000 30%));border-radius:1px 1px 5px 5px;}

.last-row{display:flex;gap:3px;justify-content:center;margin-top:10px;padding-top:10px;border-top:1px dashed rgba(255,255,255,0.1);}

.legend{display:flex;gap:20px;justify-content:center;margin-top:2rem;font-size:13px;}
.leg-box{width:18px;height:18px;border-radius:4px;margin-left:5px;}
.summary-container{max-width:900px;margin:2.5rem auto 0;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:1.5rem;}
.sum-title{font-size:15px;font-weight:600;color:var(--gold);margin-bottom:15px;border-bottom:1px solid rgba(201,168,76,0.2);padding-bottom:10px;}
.chip{background:rgba(201,168,76,0.1); border:1px solid var(--gold); border-radius:12px; padding:8px 15px; margin:5px; font-size:13px; display:inline-block; transition:0.3s;}
.chip b {color:var(--gold-light); margin-right:5px;}

#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:rgba(11,31,58,.96);border:1px solid var(--gold);color:var(--gold-light);padding:11px 22px;border-radius:12px;opacity:0;transition:0.3s;z-index:999;}
#toast.show{opacity:1}
</style>
</head>
<body>

<div class="ph">
  <h1 class="ph-title">رحلة لاتنسى ٣</h1>
  <p class="ph-sub">أهلاً وسهلاً بزائر رسول الله</p>
</div>

<div style="max-width:1100px;margin:0 auto;padding:0 1rem 4rem">
  <div id="nameSection">
    <input class="ninp" type="text" id="ni" placeholder="أدخل اسمك الثلاثي" maxlength="25">
    <button class="bstart" onclick="go()">🎟️ دخول الخريطة</button>
  </div>

  <div id="busSection">
    <div class="wbar">
      <span id="wu" style="font-weight: bold; color: var(--gold-light);"></span>
      <button onclick="back()" style="background:none;border:none;color:var(--gold);cursor:pointer; font-weight: bold;">تغيير الاسم</button>
    </div>
    
    <div class="buses-row" id="busesRow"></div>

    <div class="legend">
      <div style="display:flex;align-items:center;"><div class="leg-box" style="background:var(--sf-bod)"></div> متاح</div>
      <div style="display:flex;align-items:center;"><div class="leg-box" style="background:var(--st-bod)"></div> محجوز</div>
      <div style="display:flex;align-items:center;"><div class="leg-box" style="background:var(--gold)"></div> مقعدك</div>
    </div>

    <div class="summary-container">
      <div class="sum-title">📋 قائمة الحجوزات الحالية</div>
      <div id="sl" style="display:flex;flex-wrap:wrap;justify-content:center;"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const BUSES=[{id:1,lbl:'الباص الأول'},{id:2,lbl:'الباص الثاني'}];
const seats={1:{},2:{}};
let me='';
let myPick=null;

function render(){
  const cr=document.getElementById('busesRow');
  cr.innerHTML='';
  BUSES.forEach(b=>cr.appendChild(mkBus(b)));
}

function mkBus(b){
  const body=document.createElement('div');
  body.className='bus-body';
  body.innerHTML=`
    <div style="text-align:center;padding:10px;font-weight:900;color:var(--navy);background:var(--gold-light)">${b.lbl}</div>
    <div class="bus-windshield"></div>
    <div class="cabin">
      <div class="srows">${renderRows(b.id)}</div>
      <div class="last-row">${renderLastRow(b.id)}</div>
    </div>`;
  return body;
}

function renderRows(bid){
  let h='';
  let sNum = 1;
  // صفوف 1 إلى 5: كاملة (1-20)
  for(let r=1; r<=5; r++){
    h += `<div class="srow">
      <div class="seat-pair">${mkS(bid,sNum++)}${mkS(bid,sNum++)}</div>
      <div class="aisle">||</div>
      <div class="seat-pair">${mkS(bid,sNum++)}${mkS(bid,sNum++)}</div>
    </div>`;
  }
  // صفوف 6 و 7: الباب والحمام بوكس واحد على اليسار، والكراسي مستمرة على اليمين
  for(let r=6; r<=7; r++){
    h += `<div class="srow">
      ${r===6 ? `<div class="service-unit" style="grid-row: span 2;"><span>WC / باب</span></div>` : '<div style="width:82px"></div>'}
      <div class="aisle">||</div>
      <div class="seat-pair">${mkS(bid,sNum++)}${mkS(bid,sNum++)}</div>
    </div>`;
  }
  // بقية الصفوف (25 إلى 44)
  for(let r=8; r<=12; r++){
    h += `<div class="srow">
      <div class="seat-pair">${mkS(bid,sNum++)}${mkS(bid,sNum++)}</div>
      <div class="aisle">||</div>
      <div class="seat-pair">${mkS(bid,sNum++)}${mkS(bid,sNum++)}</div>
    </div>`;
  }
  return h;
}

function renderLastRow(bid){
  return [45,46,47,48,49].map(n=>mkS(bid,n)).join('');
}

function mkS(bid,num){
  const sid=`B${bid}-S${num}`;
  const owner=seats[bid][sid];
  const isMe=myPick===sid;
  let cls='seat';
  if(isMe) cls+=' mine'; else if(owner) cls+=' taken';
  return `<div class="${cls}" onclick="pick('${bid}','${sid}','${num}')">
    <div class="sh"></div>
    <div class="sb"><span class="slbl">${num}</span>${owner?`<span class="sown">${owner}</span>`:''}</div>
    <div class="sc"></div>
  </div>`;
}

function pick(bid,sid,num){
  if(seats[bid][sid] && seats[bid][sid]!==me) return toast('❌ هذا المقعد محجوز');
  if(myPick){ const [obid]=myPick.split('-').map(s=>s.replace('B','')); delete seats[obid][myPick]; }
  if(myPick===sid) myPick=null; else { seats[bid][sid]=me; myPick=sid; toast(`✅ تم اختيار المقعد ${num}`); }
  render(); summ();
}

function summ(){
  const el=document.getElementById('sl');
  const all=[];
  BUSES.forEach(b=> {
    Object.entries(seats[b.id]).forEach(([s,n]) => {
      const seatNum = s.split('S')[1];
      all.push({name: n, bus: b.lbl, num: seatNum});
    });
  });
  if(all.length === 0) {
    el.innerHTML = '<span style="color:rgba(255,255,255,0.2)">لا توجد حجوزات بعد</span>';
    return;
  }
  // ترتيب حسب رقم المقعد
  all.sort((a,b) => a.num - b.num);
  el.innerHTML = all.map(i=>`<div class="chip">👤 ${i.name} <b>(مقعد ${i.num} - ${i.bus})</b></div>`).join('');
}

function go(){
  const v=document.getElementById('ni').value.trim();
  if(!v) return toast('⚠️ يرجى إدخال اسمك أولاً');
  me=v; document.getElementById('nameSection').style.display='none';
  document.getElementById('busSection').style.display='block';
  document.getElementById('wu').textContent='مرحباً ' + me;
  render(); summ();
}

function back(){ document.getElementById('busSection').style.display='none'; document.getElementById('nameSection').style.display='block'; }

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
</script>
</body>
</html>
